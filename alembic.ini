# alembic.ini

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template migration file
file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(rev)s_%%(slug)s

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = true

# The SQLAlchemy database URL
sqlalchemy.url = sqlite:///./notevault.db

[post_write_hooks]
# post_write_hooks defines scripts or commands that run
# after migrations are generated


# ── Logging configuration ─────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S